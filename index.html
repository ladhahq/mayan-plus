<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'/>
    <title>Mayan Jump 2</title>
    <meta name='renderer' content='webkit'>
    <meta name='viewport' content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover'/>
    <meta name='apple-mobile-web-app-capable' content='yes' />
    <meta name='mobile-web-app-capable' content='yes' />
    <meta name='full-screen' content='true' />
    <meta name='x5-fullscreen' content='true' />
    <meta name='360-fullscreen' content='true' />
    <meta name='laya' screenorientation='portrait' />
    <meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1'>
    <meta http-equiv='expires' content='0' />
    <meta http-equiv='Cache-Control' content='no-siteapp' />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /*
         * CRITICAL: LayaAir measures the body element at init time to
         * determine the WebGL framebuffer size. The game is 750×1334
         * portrait. We must constrain the body to this aspect ratio
         * BEFORE any scripts load, otherwise the engine creates a
         * landscape-shaped canvas that clips the game vertically.
         *
         * dvh/dvw (dynamic viewport units) adjust as mobile browser
         * chrome appears/disappears, unlike vh/vw which are fixed.
         *
         * Centering: position:absolute + translate(-50%,-50%) is the
         * most reliable method across all browsers including Chrome iOS.
         * Our fix-aspect-ratio.js patch corrects mouse coordinates for
         * the transform offset via getBoundingClientRect().
         */
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            /* Fit viewport at 750:1334 portrait aspect ratio */
            width:  min(100dvw, calc(100dvh * 750 / 1334));
            height: min(100dvh, calc(100dvw * 1334 / 750));
            overflow: hidden;
            background-color: #000;
            /* Centering — works on every browser */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        canvas {
            display: block;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 18px;
            z-index: 9999;
            pointer-events: none;
            text-align: center;
        }
        #loading .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Loading indicator — hidden when game starts -->
    <div id="loading">
        <div class="spinner"></div>
        Loading Mayan Jump...
    </div>

    <!--
        Load order matters:
        1. conch-shim.ts   — stub out native APIs before engine loads (Vite transforms .ts → .js)
        2. laya.js         — LayaAir engine (2.6MB, unminified)
        3. fix-aspect-ratio.ts — patch engine internals BEFORE game inits
        4. utils.min.js    — game utilities (CommonUtils, MathUtils, etc.)
        5. jump3d.max.js   — game logic (52KB), auto-starts with new LayaAir3D()
        6. main.ts          — module entry: boot sequence + CSS (deferred)
    -->
    <script src="/src/conch-shim.ts"></script>
    <script src="laya.js" loader='laya'></script>
    <script src="/src/fix-aspect-ratio.ts"></script>
    <script src="utils.min.js" loader='laya'></script>
    <script src="jump3d.max.js" loader='laya'></script>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
